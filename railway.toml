[build]
builder = "NIXPACKS"
buildCommand = "npm run build"

[deploy]
startCommand = "npm run start"
# DB schema sync runs on every deploy. Idempotent: a no-op when schema.prisma matches the live DB.
# `prisma db push` is correct because this project has no prisma/migrations/ folder.
# Seeding is intentionally NOT here — seed.ts deleteMany()s every table, so chaining it would
# wipe the DB on every deploy. Run `railway run npm run db:seed` manually for one-off seeding.
#
# The pre-step renames CrewRole enum values FO -> SIC and CABIN -> FA in place
# (via prisma/sql/rename-crewrole.sql, idempotent), so existing CrewMember rows
# survive the schema change. Without this, prisma db push would fail because
# Postgres can't cast existing rows to the renamed enum type. See that file
# for details.
preDeployCommand = "npx prisma db execute --file prisma/sql/rename-crewrole.sql --schema prisma/schema.prisma && npx prisma db push --accept-data-loss"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/login"
healthcheckTimeout = 30
