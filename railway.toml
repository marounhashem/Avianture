[build]
builder = "NIXPACKS"
buildCommand = "npm run build"

[deploy]
startCommand = "npm run start"
# DB schema sync runs on every deploy. Idempotent: a no-op when schema.prisma matches the live DB.
# `prisma db push` is correct because this project has no prisma/migrations/ folder.
# Seeding is intentionally NOT here — seed.ts deleteMany()s every table, so chaining it would
# wipe the DB on every deploy. Run `railway run npm run db:seed` manually for one-off seeding.
preDeployCommand = "npx prisma db execute --stdin <<'SQL'\nDO $ BEGIN\n  IF EXISTS (SELECT 1 FROM pg_enum WHERE enumlabel = 'FO' AND enumtypid = (SELECT oid FROM pg_type WHERE typname = 'CrewRole')) THEN\n    ALTER TYPE \"CrewRole\" RENAME VALUE 'FO' TO 'SIC';\n  END IF;\n  IF EXISTS (SELECT 1 FROM pg_enum WHERE enumlabel = 'CABIN' AND enumtypid = (SELECT oid FROM pg_type WHERE typname = 'CrewRole')) THEN\n    ALTER TYPE \"CrewRole\" RENAME VALUE 'CABIN' TO 'FA';\n  END IF;\nEND $;\nSQL\nnpx prisma db push --accept-data-loss"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/login"
healthcheckTimeout = 30
