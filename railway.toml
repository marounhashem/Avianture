[build]
builder = "NIXPACKS"
buildCommand = "npm run build"

[deploy]
# preDeployCommand runs after build and before start, with full env/network access.
# Perfect spot for schema sync since the internal DB hostname isn't reachable during build.
preDeployCommand = ["npx prisma db push --accept-data-loss"]
startCommand = "npm run start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/login"
healthcheckTimeout = 30
