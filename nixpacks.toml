# Nixpacks build configuration for Railway.
# Prisma 7 requires Node.js 20.19+, 22.12+, or 24.0+.
# We pin to Node 22 (current LTS) to match our local dev environment.
[phases.setup]
nixPkgs = ["nodejs_22", "npm-10_x"]

[phases.install]
# Force-include devDependencies — Next.js production build needs @tailwindcss/postcss,
# typescript, prisma CLI, etc., which live in devDependencies. NODE_ENV=production in
# Railway would otherwise prune them on some install paths.
cmds = ["npm ci --include=dev --no-audit --no-fund"]
